exclude: '^(docs/|\.claude/CLAUDE\.MD$|xcash/evm/contracts/artifacts/|xcash/static/pay/assets/)|/migrations/|devcontainer\.json$'
default_stages: [ pre-commit ]

default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.19.0'
    hooks:
      - id: django-upgrade
        args: [ '--target-version', '4.2' ]

  # Run the Ruff linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Linter only（暂不做全量格式化，避免一次性改动历史文件）
      - id: ruff
        args: [ --fix, --exit-non-zero-on-fix ]

  - repo: local
    hooks:
      - id: django-makemigrations-check
        name: Django makemigrations check
        entry: uv run python scripts/dev_manage.py makemigrations --check --dry-run
        language: system
        pass_filenames: false
        always_run: true

      - id: django-migration-linter
        name: Django migration linter
        entry: uv run python scripts/dev_lint_migrations.py
        language: system
        pass_filenames: false
        always_run: true

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: [ ]
  submodules: false
