name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18.4-trixie
        env:
          POSTGRES_DB: xcash
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d xcash"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.2.1
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      TRUSTED_PROXY_IPS: 127.0.0.1,::1
      WALLET_MNEMONIC_ENCRYPTION_KEY: test-wallet-mnemonic-encryption-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Check migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: ./scripts/dev-manage.sh makemigrations --check --dry-run

      - name: Lint migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: ./scripts/dev-lint-migrations.sh

      - name: Pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: uv run pytest --create-db --nomigrations -q
